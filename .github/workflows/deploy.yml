name: Deploy LaTeX Editor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to project directory
            cd /home/ubuntu/latex-editor
            
            # Pull latest changes
            git pull origin main
            
            # Create/Update .env files from GitHub Secrets
            # Backend .env
            cat <<EOF > backend/.env
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}"
            BETTER_AUTH_BASE_URL="${{ secrets.BETTER_AUTH_BASE_URL }}"
            PORT=8080
            EOF

            # Frontend .env
            cat <<EOF > frontend/.env
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}"
            BETTER_AUTH_BASE_URL="${{ secrets.BETTER_AUTH_BASE_URL }}"
            NEXT_PUBLIC_BETTER_AUTH_URL="${{ secrets.BETTER_AUTH_BASE_URL }}"
            LATEX_COMPILE_URL="http://localhost:8080/trpc"
            NEXT_PUBLIC_BASE_URL="${{ secrets.NEXT_PUBLIC_BASE_URL }}"
            EOF
            
            # Run installation and build script
            # This script handles npm install, npm build, and PM2 restarts
            bash scripts/install.sh
            
            # Save PM2 state to persist on boots
            pm2 save
